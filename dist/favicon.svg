<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a2540"/>

  <!-- Flask body -->
  <path d="M24 14 L24 30 L14 46 Q12 50 16 52 L48 52 Q52 50 50 46 L40 30 L40 14 Z"
    fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Flask neck top bar -->
  <line x1="22" y1="14" x2="42" y2="14" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Liquid fill inside flask -->
  <path d="M18 46 Q16 50 20 51 L44 51 Q48 50 46 46 L36 32 L28 32 Z" fill="#00d4aa" opacity="0.25"/>

  <!-- Bubbles -->
  <circle cx="27" cy="44" r="2.5" fill="#00d4aa" opacity="0.7"/>
  <circle cx="35" cy="40" r="1.8" fill="#00d4aa" opacity="0.5"/>
  <circle cx="31" cy="47" r="1.4" fill="#00d4aa" opacity="0.6"/>

  <!-- Atom orbit ring -->
  <ellipse cx="32" cy="22" rx="10" ry="4" stroke="#4fc3f7" stroke-width="1.2" opacity="0.5" stroke-dasharray="3 2"/>
  <circle cx="42" cy="22" r="2" fill="#4fc3f7" opacity="0.7"/>
</svg>
